<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蝦皮賣家經營實戰百科</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-orange-50 text-gray-800 font-sans">

    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <h1 class="text-2xl font-bold text-orange-600">蝦皮賣家經營實戰百科</h1>
            <input type="text" id="searchInput" placeholder="搜尋專有名詞或詳細解釋..." 
                   class="w-full md:w-96 p-2 rounded-lg border border-orange-200 focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent transition">
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div id="filterContainer" class="flex flex-wrap gap-2 justify-center mb-10">
            <button class="filter-btn active bg-orange-500 text-white px-5 py-2 rounded-full text-sm font-medium shadow-sm transition" data-category="全部">全部</button>
        </div>

        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-orange-400">
                <p class="text-lg">正在讀取最新百科資料...</p>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 text-gray-400 text-sm">
        <p>© 2026 蝦皮賣家經營實戰百科 | Data from Google Sheets</p>
    </footer>

    <style>
        .filter-btn { transition: all 0.2s; }
        .filter-btn:not(.active) { @apply bg-white text-orange-600 border border-orange-200 hover:bg-orange-100; }
    </style>

    <script>
        // --- 設定區：請將連結貼在此 ---
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQblIgNjAUV4scJdrKGysCV76kJ402uUie56FZCdjn7sguNH_K9QbU7UkjYcuG6Rbh_jMzcmaIqpS-v/pub?output=csv";
        // -----------------------------

        let glossaryData = [];
        let categories = new Set(['全部']);

        async function init() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        glossaryData = results.data;
                        // 動態提取類別
                        glossaryData.forEach(item => { if(item.類別) categories.add(item.類別); });
                        renderFilters();
                        renderCards(glossaryData);
                    }
                });
            } catch (error) {
                console.error("資料讀取失敗:", error);
                document.getElementById('cardsContainer').innerHTML = `<p class="col-span-full text-center text-red-500">資料讀取失敗，請確認 CSV 網址是否正確發佈。</p>`;
            }
        }

        function renderFilters() {
            const container = document.getElementById('filterContainer');
            // 只渲染非「全部」的分類按鈕
            Array.from(categories).sort().forEach(cat => {
                if (cat === '全部') return;
                const btn = document.createElement('button');
                btn.className = "filter-btn bg-white text-orange-600 border border-orange-200 px-5 py-2 rounded-full text-sm font-medium hover:bg-orange-100 transition";
                btn.innerText = cat;
                btn.dataset.category = cat;
                container.appendChild(btn);
            });
        }

        function renderCards(items) {
            const container = document.getElementById('cardsContainer');
            if (items.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center py-20 text-gray-400">找不到相符的名詞內容。</p>`;
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-orange-50 hover:shadow-md hover:-translate-y-1 transition duration-300">
                    <div class="flex items-center justify-between mb-3">
                        <span class="px-2 py-1 bg-orange-100 text-orange-600 text-[10px] font-bold rounded uppercase tracking-wider">${item.類別}</span>
                    </div>
                    <h2 class="text-xl font-bold text-gray-800 mb-3">${item.專有名詞}</h2>
                    <div class="h-px bg-orange-50 w-full mb-3"></div>
                    <p class="text-gray-600 text-sm leading-relaxed">${item.詳細解釋}</p>
                </div>
            `).join('');
        }

        // 搜尋輸入監聽
        document.getElementById('searchInput').addEventListener('input', () => filterData());

        // 分類點擊監聽
        document.getElementById('filterContainer').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                // 切換按鈕樣式
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('bg-orange-500', 'text-white', 'active');
                    btn.classList.add('bg-white', 'text-orange-600');
                });
                e.target.classList.add('bg-orange-500', 'text-white', 'active');
                e.target.classList.remove('bg-white', 'text-orange-600');
                
                filterData(e.target.dataset.category);
            }
        });

        function filterData(currentCategory = document.querySelector('.filter-btn.active').dataset.category) {
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = glossaryData.filter(item => {
                const matchCat = (currentCategory === '全部' || item.類別 === currentCategory);
                const matchText = (item.專有名詞.toLowerCase().includes(query) || item.詳細解釋.toLowerCase().includes(query));
                return matchCat && matchText;
            });
            renderCards(filtered);
        }

        init();
    </script>
</body>
</html>
