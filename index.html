<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蝦皮經營專有名詞百科</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc;
        }
        /* 固定標題欄 */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-b: 1px solid #e2e8f0;
        }
        /* 固定分類列 - 在手機上會緊跟在標題下方 */
        .sticky-filter {
            position: sticky;
            top: 68px; /* 根據標題高度調整 */
            z-index: 40;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #f1f5f9;
        }
        @media (min-width: 768px) {
            .sticky-filter { top: 76px; }
        }

        /* 公式高亮：深色質感 */
        .formula-highlight {
            @apply inline-block px-2 py-0.5 bg-indigo-600 text-white rounded-md font-bold text-xs mx-1 shadow-sm;
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px -5px rgba(15, 23, 42, 0.08);
        }

        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800">

    <header class="sticky-header">
        <div class="container mx-auto px-4 py-3 md:py-4 flex flex-col md:flex-row items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-slate-800 rounded-lg flex items-center justify-center shadow-lg">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                </div>
                <h1 class="text-lg md:text-xl font-bold text-slate-800 tracking-tight">蝦皮經營專有名詞百科</h1>
            </div>
            <div class="w-full md:w-72 relative">
                <input type="text" id="searchInput" placeholder="搜尋關鍵字或公式..." 
                       class="w-full pl-10 pr-4 py-1.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all text-sm">
                <svg class="w-4 h-4 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>
    </header>

    <nav class="sticky-filter">
        <div class="container mx-auto px-4 py-3">
            <div id="filterContainer" class="flex flex-nowrap overflow-x-auto no-scrollbar gap-2 justify-start md:justify-center">
                </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-8">
            <div class="col-span-full text-center py-20 text-slate-400">
                <div class="inline-block w-8 h-8 border-4 border-slate-200 border-t-slate-800 rounded-full animate-spin mb-4"></div>
                <p>正在載入專業百科資料庫...</p>
            </div>
        </div>
    </main>

    <footer class="text-center py-12 text-slate-400 text-xs border-t border-slate-100 mt-20">
        <p>蝦皮經營專有名詞百科 · 專業顧問版內容</p>
    </footer>

    <script>
        // --- 設定區：請將連結貼在此 ---
        const SHEET_CSV_URL = "請將你的發佈網址貼在這裡";
        // -----------------------------

        let glossaryData = [];
        // 定義排序規則
        const CATEGORY_ORDER = ["全部", "選品與市場", "財務指標與獲利管理", "行銷與廣告投放", "物流與檢驗"];

        async function init() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        glossaryData = results.data;
                        renderFilters();
                        renderCards(glossaryData);
                    }
                });
            } catch (error) {
                console.error(error);
                document.getElementById('cardsContainer').innerHTML = `<p class="col-span-full text-center text-red-400">連線失敗，請檢查 Google Sheets 發布網址。</p>`;
            }
        }

        function renderFilters() {
            const container = document.getElementById('filterContainer');
            // 根據預設順序生成按鈕
            CATEGORY_ORDER.forEach(cat => {
                const btn = document.createElement('button');
                btn.innerText = cat;
                btn.dataset.category = cat;
                // 設定預設樣式：如果是「全部」則設為 active
                if (cat === "全部") {
                    btn.className = "filter-btn active whitespace-nowrap px-5 py-1.5 rounded-full text-sm font-medium transition-all bg-slate-800 text-white shadow-md";
                } else {
                    btn.className = "filter-btn whitespace-nowrap px-5 py-1.5 rounded-full text-sm font-medium transition-all bg-slate-100 text-slate-600 hover:bg-slate-200";
                }
                container.appendChild(btn);
            });
        }

        // 偵測「公式 = 」並換色
        function formatDescription(text) {
            if (!text) return "";
            // 使用正則表達式尋找 公式...
            return text.replace(/(公式\s*[=：:]\s*[^。，\n(]+)/g, '<span class="formula-highlight">$1</span>');
        }

        function renderCards(items) {
            const container = document.getElementById('cardsContainer');
            if (items.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400">未找到相符內容</div>`;
                return;
            }

            container.innerHTML = items.map((item, index) => `
                <div class="card-hover bg-white p-6 rounded-2xl border border-slate-100 relative group overflow-hidden">
                    <div class="absolute top-0 right-0 p-3 text-[10px] font-mono text-slate-300 group-hover:text-slate-400 transition-colors">
                        #${String(index + 1).padStart(2, '0')}
                    </div>
                    <div class="mb-4">
                        <span class="inline-block px-2 py-0.5 bg-slate-50 text-slate-500 text-[10px] font-bold rounded border border-slate-100 mb-2 uppercase tracking-tighter">
                            ${item.類別}
                        </span>
                        <h2 class="text-lg font-bold text-slate-800">${item.專有名詞}</h2>
                    </div>
                    <div class="w-8 h-1 bg-slate-100 mb-4 rounded-full group-hover:w-full group-hover:bg-indigo-100 transition-all duration-500"></div>
                    <p class="text-slate-600 text-sm leading-relaxed">
                        ${formatDescription(item.詳細解釋)}
                    </p>
                </div>
            `).join('');
        }

        // 搜尋監聽
        document.getElementById('searchInput').addEventListener('input', () => filterData());

        // 分類點擊監聽
        document.getElementById('filterContainer').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('bg-slate-800', 'text-white', 'shadow-md', 'active');
                    btn.classList.add('bg-slate-100', 'text-slate-600');
                });
                e.target.classList.remove('bg-slate-100', 'text-slate-600');
                e.target.classList.add('bg-slate-800', 'text-white', 'shadow-md', 'active');
                
                filterData(e.target.dataset.category);
                // 手動滑動到最上方避免被導航遮住太久
                if (window.innerWidth < 768) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }
        });

        function filterData(currentCategory = document.querySelector('.filter-btn.active').dataset.category) {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = glossaryData.filter(item => {
                const matchCat = (currentCategory === '全部' || item.類別 === currentCategory);
                const matchText = (item.專有名詞.toLowerCase().includes(query) || item.詳細解釋.toLowerCase().includes(query));
                return matchCat && matchText;
            });
            renderCards(filtered);
        }

        init();
    </script>
</body>
</html>
