<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蝦皮經營專有名詞百科</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .formula-tag {
            @apply inline-block px-2 py-0.5 bg-orange-100 text-orange-700 rounded font-bold text-sm border border-orange-200 mx-0.5;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(255, 87, 34, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 text-slate-800">

    <header class="glass-header sticky top-0 z-50 border-b border-orange-100">
        <div class="container mx-auto px-4 py-4 md:py-6">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg shadow-orange-200">
                        <span class="text-white font-bold text-xl">蝦</span>
                    </div>
                    <h1 class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-orange-600 to-orange-400">
                        蝦皮經營專有名詞百科
                    </h1>
                </div>
                <div class="w-full md:w-80 relative">
                    <input type="text" id="searchInput" placeholder="搜尋關鍵字或公式..." 
                           class="w-full pl-10 pr-4 py-2.5 rounded-2xl border border-orange-100 bg-white/50 focus:bg-white focus:outline-none focus:ring-4 focus:ring-orange-100 focus:border-orange-400 transition-all text-sm">
                    <svg class="w-5 h-5 absolute left-3 top-3 text-orange-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div id="filterContainer" class="flex flex-wrap gap-2 justify-center mb-12">
            <button class="filter-btn active px-6 py-2 rounded-xl text-sm font-medium transition-all shadow-sm bg-orange-500 text-white" data-category="全部">全部名詞</button>
        </div>

        <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
            <div class="col-span-full text-center py-24">
                <div class="inline-block w-8 h-8 border-4 border-orange-200 border-t-orange-500 rounded-full animate-spin mb-4"></div>
                <p class="text-slate-400 font-medium">正在為您準備專業百科資料...</p>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-100 py-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-slate-400 text-sm">蝦皮經營實戰百科 · 專業教學版本</p>
        </div>
    </footer>

    <script>
        // --- 設定區：請將連結貼在此 ---
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQblIgNjAUV4scJdrKGysCV76kJ402uUie56FZCdjn7sguNH_K9QbU7UkjYcuG6Rbh_jMzcmaIqpS-v/pubhtml";
        // -----------------------------

        let glossaryData = [];
        let categories = new Set(['全部']);

        async function init() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        glossaryData = results.data;
                        glossaryData.forEach(item => { if(item.類別) categories.add(item.類別); });
                        renderFilters();
                        renderCards(glossaryData);
                    }
                });
            } catch (error) {
                document.getElementById('cardsContainer').innerHTML = `<p class="col-span-full text-center text-red-500 py-10">資料載入失敗，請確認網址發佈設定。</p>`;
            }
        }

        function renderFilters() {
            const container = document.getElementById('filterContainer');
            Array.from(categories).sort().forEach(cat => {
                if (cat === '全部') return;
                const btn = document.createElement('button');
                btn.className = "filter-btn px-6 py-2 rounded-xl text-sm font-medium transition-all bg-white text-slate-600 border border-slate-200 hover:border-orange-300 hover:text-orange-500";
                btn.innerText = cat;
                btn.dataset.category = cat;
                container.appendChild(btn);
            });
        }

        // 格式化解釋內容：針對「公式 =」進行變色與標籤化
        function formatDescription(text) {
            if (!text) return "";
            // 偵測「公式 = xxx」或「公式：xxx」
            return text.replace(/(公式\s*[=：:]\s*[^。，\n]+)/g, '<span class="formula-tag">$1</span>');
        }

        function renderCards(items) {
            const container = document.getElementById('cardsContainer');
            if (items.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400">沒有找到相關結果</div>`;
                return;
            }

            container.innerHTML = items.map((item, index) => `
                <div class="card-hover bg-white p-7 rounded-3xl border border-slate-100 transition-all duration-300 flex flex-col relative overflow-hidden">
                    <div class="absolute -top-1 -right-1 bg-orange-50 text-orange-400 font-bold text-xs w-10 h-10 flex items-center justify-center rounded-bl-3xl">
                        #${String(index + 1).padStart(2, '0')}
                    </div>
                    
                    <div class="mb-4">
                        <span class="inline-block px-3 py-1 bg-slate-50 text-slate-500 text-[10px] font-bold rounded-full border border-slate-100 mb-3">
                            ${item.類別}
                        </span>
                        <h2 class="text-xl font-bold text-slate-800 group-hover:text-orange-600 transition-colors">
                            ${item.專有名詞}
                        </h2>
                    </div>
                    
                    <div class="h-px bg-gradient-to-r from-orange-100 to-transparent w-full mb-5"></div>
                    
                    <p class="text-slate-600 text-sm leading-relaxed">
                        ${formatDescription(item.詳細解釋)}
                    </p>
                </div>
            `).join('');
        }

        // 搜尋邏輯
        document.getElementById('searchInput').addEventListener('input', (e) => filterData());

        // 分類點擊
        document.getElementById('filterContainer').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('bg-orange-500', 'text-white', 'shadow-md');
                    btn.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
                });
                e.target.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
                e.target.classList.add('bg-orange-500', 'text-white', 'shadow-md');
                filterData(e.target.dataset.category);
            }
        });

        function filterData(currentCategory = document.querySelector('.filter-btn.active').dataset.category) {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = glossaryData.filter(item => {
                const matchCat = (currentCategory === '全部' || item.類別 === currentCategory);
                const matchText = (item.專有名詞.toLowerCase().includes(query) || item.詳細解釋.toLowerCase().includes(query));
                return matchCat && matchText;
            });
            renderCards(filtered);
        }

        init();
    </script>
</body>
</html>
