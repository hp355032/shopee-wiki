<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蝦皮經營專有名詞百科</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc;
            padding-top: 160px; 
        }
        @media (min-width: 768px) { body { padding-top: 150px; } }

        .fixed-header-group {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: white; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
        }

        /* 關鍵：文案置中並處理換行 */
        .description-text {
            white-space: pre-wrap; 
            word-break: break-word;
            text-align: center; /* 文案置中 */
            display: block;
            width: 100%;
        }

        .formula-highlight {
            @apply inline-block px-2 py-0.5 bg-slate-700 text-white rounded font-bold text-xs mx-1 shadow-sm my-1;
        }
        
        .auto-link {
            @apply inline-flex items-center text-indigo-600 font-bold underline decoration-2 decoration-indigo-200 hover:text-indigo-800 transition-colors bg-indigo-50 px-3 py-1.5 rounded-lg text-xs mt-3 mx-auto;
            display: table; /* 讓連結也能隨文字置中 */
        }
        
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .filter-btn.active {
            background-color: #1e293b !important;
            color: white !important;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="text-slate-800">

    <div class="fixed-header-group">
        <header class="border-b border-slate-100 bg-white">
            <div class="container mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-3">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-slate-800 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    </div>
                    <h1 class="text-lg font-bold text-slate-800">蝦皮經營專有名詞百科</h1>
                </div>
                <div class="relative w-full md:w-64">
                    <input type="text" id="searchInput" placeholder="搜尋關鍵字或公式..." 
                           class="w-full pl-9 pr-3 py-2 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-slate-800 text-sm">
                    <svg class="w-4 h-4 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </header>

        <nav class="bg-white py-3">
            <div class="container mx-auto px-4">
                <div id="filterContainer" class="flex flex-nowrap overflow-x-auto no-scrollbar gap-2 justify-start md:justify-center"></div>
            </div>
        </nav>
    </div>

    <main class="container mx-auto px-4 py-6">
        <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQblIgNjAUV4scJdrKGysCV76kJ402uUie56FZCdjn7sguNH_K9QbU7UkjYcuG6Rbh_jMzcmaIqpS-v/pub?output=csv";
        let glossaryData = [];
        const CATEGORY_ORDER = ["全部", "選品與市場", "財務指標與獲利管理", "行銷與廣告投放", "物流與檢驗"];

        async function init() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                Papa.parse(csvText, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) {
                        glossaryData = results.data;
                        renderFilters();
                        renderCards(glossaryData);
                    }
                });
            } catch (error) { console.error(error); }
        }

        function renderFilters() {
            const container = document.getElementById('filterContainer');
            container.innerHTML = "";
            CATEGORY_ORDER.forEach(cat => {
                const btn = document.createElement('button');
                btn.innerText = cat;
                btn.dataset.category = cat;
                btn.className = cat === "全部" 
                    ? "filter-btn active whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow-sm"
                    : "filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-medium transition-all bg-slate-100 text-slate-500 hover:bg-slate-200";
                container.appendChild(btn);
            });
        }

        function formatContent(text) {
            if (!text) return "";
            
            // 自動修剪首尾空白 
            let formatted = text.trim();

            // 1. 隱藏長網址
            const keywordLinkRegex = /(課程連結|點此查詢|查詢|連結|傳送門)[:：]\s*(https?:\/\/[^\s]+)/g;
            formatted = formatted.replace(keywordLinkRegex, '<a href="$2" target="_blank" class="auto-link">🔗 $1</a>');

            const rawUrlRegex = /(?<!href=")(https?:\/\/[^\s]+)/g;
            formatted = formatted.replace(rawUrlRegex, '<a href="$1" target="_blank" class="auto-link">🔗 點擊查看</a>');

            // 2. 公式高亮 [cite: 9, 11]
            formatted = formatted.replace(/(公式\s*[=：:]\s*[^。，\n(]+)/g, '<span class="formula-highlight">$1</span>');

            return formatted;
        }

        function renderCards(items) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = items.map((item, index) => `
                <div class="card-hover bg-white p-7 rounded-2xl border border-slate-100 flex flex-col relative group">
                    <div class="absolute top-0 right-0 p-3 text-[10px] font-mono text-slate-300">#${String(index + 1).padStart(2, '0')}</div>
                    <div class="text-center mb-4">
                        <span class="inline-block px-2 py-0.5 bg-slate-100 text-slate-500 text-[9px] font-bold rounded uppercase tracking-tighter mb-2">${item.類別}</span>
                        <h2 class="text-xl font-bold text-slate-800">${item.專有名詞}</h2>
                    </div>
                    <div class="mx-auto w-8 h-1 bg-slate-200 mb-5 rounded-full group-hover:w-full group-hover:bg-indigo-400 transition-all duration-500"></div>
                    <p class="description-text text-slate-600 text-sm leading-relaxed">
                        ${formatContent(item.詳細解釋)}
                    </p>
                </div>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', () => filterData());
        document.getElementById('filterContainer').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('active', 'bg-slate-800', 'text-white');
                    btn.classList.add('bg-slate-100', 'text-slate-500');
                });
                e.target.classList.add('active');
                e.target.classList.remove('bg-slate-100', 'text-slate-500');
                filterData(e.target.dataset.category);
            }
        });

        function filterData(currentCategory = document.querySelector('.filter-btn.active').dataset.category) {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = glossaryData.filter(item => {
                const matchCat = (currentCategory === '全部' || item.類別 === currentCategory);
                const matchText = (item.專有名詞.toLowerCase().includes(query) || (item.詳細解釋 && item.詳細解釋.toLowerCase().includes(query)));
                return matchCat && matchText;
            });
            renderCards(filtered);
        }

        init();
    </script>
</body>
</html>
