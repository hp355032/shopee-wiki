<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蝦皮賣家經營實戰百科</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-orange-50 text-gray-800">

    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-orange-600 text-center mb-8">蝦皮賣家經營實戰百科</h1>

        <div class="max-w-2xl mx-auto mb-8">
            <input type="text" id="searchInput" placeholder="搜尋專有名詞或解釋..." class="w-full p-3 rounded-lg border border-orange-200 focus:outline-none focus:ring-2 focus:ring-orange-400 mb-4">
            <div id="filterContainer" class="flex flex-wrap gap-2 justify-center">
                <button class="filter-btn bg-orange-500 text-white px-4 py-1 rounded-full text-sm" data-category="全部">全部</button>
            </div>
        </div>

        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        // --- 設定區：請將連結貼在此 ---
        const SHEET_CSV_URL = "請將你的發佈網址貼在這裡";
        // -----------------------------

        let data = [];
        let categories = new Set(['全部']);

        async function init() {
            const response = await fetch(SHEET_CSV_URL);
            const csvText = await response.text();
            
            Papa.parse(csvText, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    data = results.data;
                    data.forEach(item => categories.add(item.類別));
                    renderFilters();
                    renderCards(data);
                }
            });
        }

        function renderFilters() {
            const container = document.getElementById('filterContainer');
            categories.forEach(cat => {
                if (cat === '全部') return;
                const btn = document.createElement('button');
                btn.className = "filter-btn bg-white border border-orange-300 text-orange-600 px-4 py-1 rounded-full text-sm hover:bg-orange-100 transition";
                btn.innerText = cat;
                btn.dataset.category = cat;
                container.appendChild(btn);
            });
        }

        function renderCards(items) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = items.map(item => `
                <div class="bg-white p-6 rounded-xl shadow-sm border border-orange-100 hover:shadow-md transition">
                    <span class="text-xs font-bold text-orange-400 uppercase tracking-wider">${item.類別}</span>
                    <h2 class="text-xl font-bold text-gray-800 mt-1 mb-2">${item.專有名詞}</h2>
                    <p class="text-gray-600 text-sm leading-relaxed">${item.詳細解釋}</p>
                </div>
            `).join('');
        }

        // 搜尋與篩選邏輯
        document.addEventListener('input', (e) => {
            if (e.target.id === 'searchInput') filterData();
        });

        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.replace('bg-orange-500', 'bg-white'));
                e.target.classList.add('bg-orange-500', 'text-white');
                filterData(e.target.dataset.category);
            }
        });

        function filterData(category = '全部') {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = data.filter(item => {
                const matchCat = (category === '全部' || item.類別 === category);
                const matchText = (item.專有名詞.toLowerCase().includes(query) || item.詳細解釋.toLowerCase().includes(query));
                return matchCat && matchText;
            });
            renderCards(filtered);
        }

        init();
    </script>
</body>
</html>
