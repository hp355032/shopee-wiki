<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蝦皮經營專有名詞百科</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc;
            scroll-behavior: smooth;
        }
        /* 固定標題欄 */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
        }
        /* 固定分類列 - 手機版與桌機版高度微調 */
        .sticky-filter {
            position: sticky;
            top: 104px; /* 手機版疊加標題後的高度 */
            z-index: 40;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #f1f5f9;
        }
        @media (min-width: 768px) {
            .sticky-header { top: 0; }
            .sticky-filter { top: 76px; } /* 桌機版標題較矮 */
        }

        /* 公式高亮：深色系強對比 */
        .formula-highlight {
            @apply inline-block px-2 py-0.5 bg-indigo-700 text-white rounded-md font-bold text-[13px] mx-1 shadow-sm tracking-wide;
        }
        
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.08);
        }

        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800">

    <header class="sticky-header">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-slate-800 rounded-xl flex items-center justify-center shadow-lg">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                </div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">蝦皮經營專有名詞百科</h1>
            </div>
            <div class="w-full md:w-80 relative">
                <input type="text" id="searchInput" placeholder="搜尋關鍵字（如：引流、毛利、公式）..." 
                       class="w-full pl-10 pr-4 py-2 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none focus:ring-4 focus:ring-slate-100 focus:border-slate-400 transition-all text-sm">
                <svg class="w-4 h-4 absolute left-3.5 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>
    </header>

    <nav class="sticky-filter">
        <div class="container mx-auto px-4 py-3">
            <div id="filterContainer" class="flex flex-nowrap overflow-x-auto no-scrollbar gap-2 justify-start md:justify-center">
                </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 md:py-12">
        <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
            <div class="col-span-full text-center py-24">
                <div class="inline-block w-8 h-8 border-4 border-slate-200 border-t-slate-800 rounded-full animate-spin mb-4"></div>
                <p class="text-slate-400 font-medium tracking-widest">系統正在同步最新資料庫...</p>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-100 py-16 mt-20">
        <div class="container mx-auto px-4 text-center">
            <p class="text-slate-400 text-xs tracking-widest uppercase mb-2">專業教學實戰版本</p>
            <p class="text-slate-500 text-sm font-medium">蝦皮經營專有名詞百科 © 2026</p>
        </div>
    </footer>

    <script>
        // --- 設定區：請將連結貼在此 ---
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQblIgNjAUV4scJdrKGysCV76kJ402uUie56FZCdjn7sguNH_K9QbU7UkjYcuG6Rbh_jMzcmaIqpS-v/pub?output=csv";
        // -----------------------------

        let glossaryData = [];
        // 指定排序順序
        const CATEGORY_ORDER = ["全部", "選品與市場", "財務指標與獲利管理", "行銷與廣告投放", "物流與檢驗"];

        async function init() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        glossaryData = results.data;
                        renderFilters();
                        renderCards(glossaryData);
                    }
                });
            } catch (error) {
                document.getElementById('cardsContainer').innerHTML = `<div class="col-span-full text-center text-red-400 py-10 bg-red-50 rounded-2xl border border-red-100 mx-4">資料連結異常，請確認 Google Sheets CSV 發布設定。</div>`;
            }
        }

        function renderFilters() {
            const container = document.getElementById('filterContainer');
            CATEGORY_ORDER.forEach(cat => {
                const btn = document.createElement('button');
                btn.innerText = cat;
                btn.dataset.category = cat;
                // 初始化樣式
                if (cat === "全部") {
                    btn.className = "filter-btn active whitespace-nowrap px-6 py-2 rounded-xl text-sm font-bold transition-all bg-slate-800 text-white shadow-md";
                } else {
                    btn.className = "filter-btn whitespace-nowrap px-6 py-2 rounded-xl text-sm font-medium transition-all bg-slate-100 text-slate-600 hover:bg-slate-200";
                }
                container.appendChild(btn);
            });
        }

        // 公式偵測高亮 (優化版：支援更多括號與符號)
        function formatDescription(text) {
            if (!text) return "";
            return text.replace(/(公式\s*[=：:]\s*[^。，\n]+)/g, '<span class="formula-highlight">$1</span>');
        }

        function renderCards(items) {
            const container = document.getElementById('cardsContainer');
            if (items.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400">找不到相符的名詞內容</div>`;
                return;
            }

            container.innerHTML = items.map((item, index) => `
                <div class="card-hover bg-white p-8 rounded-3xl border border-slate-100 flex flex-col relative overflow-hidden group">
                    <div class="absolute -top-1 -right-1 bg-slate-50 text-slate-400 font-mono font-bold text-[10px] w-12 h-12 flex items-center justify-center rounded-bl-3xl border-l border-b border-slate-50 transition-colors group-hover:bg-indigo-50 group-hover:text-indigo-500">
                        #${String(index + 1).padStart(2, '0')}
                    </div>
                    <div class="mb-5">
                        <span class="inline-block px-3 py-1 bg-slate-50 text-slate-400 text-[10px] font-bold rounded-lg border border-slate-100 mb-3 uppercase tracking-widest group-hover:text-indigo-500 transition-colors">
                            ${item.類別}
                        </span>
                        <h2 class="text-xl font-bold text-slate-800 tracking-tight leading-snug">
                            ${item.專有名詞}
                        </h2>
                    </div>
                    <div class="h-1 bg-slate-50 w-12 mb-6 rounded-full group-hover:w-full group-hover:bg-indigo-100 transition-all duration-500"></div>
                    <p class="text-slate-600 text-sm leading-relaxed">
                        ${formatDescription(item.詳細解釋)}
                    </p>
                </div>
            `).join('');
        }

        // 搜尋邏輯：全局優先搜尋
        function filterData(targetCategory) {
            const searchInput = document.getElementById('searchInput');
            const query = searchInput.value.trim().toLowerCase();
            
            // 找出目前點選的標籤（如果沒有傳入 target，就抓 UI 上 active 的那個）
            let activeBtn = document.querySelector('.filter-btn.active');
            let currentCategory = targetCategory || (activeBtn ? activeBtn.dataset.category : '全部');

            // --- 核心改動：搜尋優先邏輯 ---
            // 如果搜尋框有字，無視當前標籤，強制進行全局搜尋
            if (query !== "") {
                currentCategory = "全部";
                // 同步更新分類按鈕樣式到「全部」，讓學員知道搜尋結果是跨類別的
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('bg-slate-800', 'text-white', 'shadow-md', 'active');
                    btn.classList.add('bg-slate-100', 'text-slate-600');
                    if (btn.dataset.category === "全部") {
                        btn.classList.add('bg-slate-800', 'text-white', 'shadow-md', 'active');
                        btn.classList.remove('bg-slate-100', 'text-slate-600');
                    }
                });
            }

            const filtered = glossaryData.filter(item => {
                const matchCat = (currentCategory === '全部' || item.類別 === currentCategory);
                const matchText = (
                    item.專有名詞.toLowerCase().includes(query) || 
                    item.詳細解釋.toLowerCase().includes(query) ||
                    item.類別.toLowerCase().includes(query)
                );
                return matchCat && matchText;
            });
            renderCards(filtered);
        }

        // 監聽搜尋輸入
        document.getElementById('searchInput').addEventListener('input', () => filterData());

        // 監聽分類點擊
        document.getElementById('filterContainer').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                // 點擊分類時，主動清空搜尋框（或是保留關鍵字但在該分類搜，此處選擇保留關鍵字並在該分類搜）
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('bg-slate-800', 'text-white', 'shadow-md', 'active');
                    btn.classList.add('bg-slate-100', 'text-slate-600');
                });
                e.target.classList.remove('bg-white', 'text-slate-600', 'bg-slate-100');
                e.target.classList.add('bg-slate-800', 'text-white', 'shadow-md', 'active');
                
                filterData(e.target.dataset.category);
            }
        });

        init();
    </script>
</body>
</html>
